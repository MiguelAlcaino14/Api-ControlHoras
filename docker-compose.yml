services:
  # ── Base de datos local ──
  db:
    image: postgres:16-alpine
    container_name: controlhoras-db-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlhoras"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API (hot reload) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: controlhoras-api-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
